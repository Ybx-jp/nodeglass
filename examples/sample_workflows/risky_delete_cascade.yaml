name: risky-delete-cascade
metadata:
  description: "API call chains through stateful mutation to fan-out deletes. Expected risk: high or critical."
  version: 2

nodes:
  - id: call_api
    operation: invoke_api
    params:
      endpoint: /users
  - id: mutate
    operation: mutate_state
  - id: exec
    operation: execute_code
    params:
      script: cleanup.sh
  - id: del_records
    operation: delete_record
    params:
      table: users
  - id: del_files
    operation: delete_file
  - id: destroy
    operation: destroy_resource
  - id: notify
    operation: send_notification

edges:
  - source_id: call_api
    target_id: mutate
  - source_id: mutate
    target_id: exec
  - source_id: exec
    target_id: del_records
  - source_id: exec
    target_id: del_files
  - source_id: exec
    target_id: destroy
  - source_id: del_records
    target_id: notify
  - source_id: del_files
    target_id: notify
  - source_id: destroy
    target_id: notify
